<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .demo {
            width: 800px;
            height: 400px;
            background: linear-gradient(135deg, #0a1929 0%, #0d2137 30%, #0f2944 60%, #0d2137 100%);
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }
        /* 齿轮 */
        .gear {
            position: absolute;
            border: 3px solid rgba(0, 168, 255, 0.3);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }
        .gear::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(0, 168, 255, 0.2);
            border-radius: 50%;
            width: 70%;
            height: 70%;
        }
        .gear-1 {
            width: 200px;
            height: 200px;
            top: 20px;
            right: 50px;
        }
        .gear-2 {
            width: 150px;
            height: 150px;
            bottom: 30px;
            left: 80px;
            animation-direction: reverse;
        }
        /* 线圈 */
        .coil {
            position: absolute;
            width: 250px;
            height: 250px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid rgba(0, 168, 255, 0.2);
            border-radius: 50%;
        }
        .coil::before, .coil::after {
            content: '';
            position: absolute;
            border: 3px solid rgba(0, 168, 255, 0.15);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .coil::before { width: 200px; height: 200px; }
        .coil::after { width: 150px; height: 150px; border-width: 2px; }
        /* 文字 */
        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: "Microsoft YaHei", sans-serif;
            text-align: center;
            z-index: 10;
        }
        .text h1 {
            font-size: 48px;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .text p {
            font-size: 18px;
            margin: 0;
            opacity: 0.9;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="demo">
        <div class="gear gear-1"></div>
        <div class="gear gear-2"></div>
        <div class="coil"></div>
        <div class="text">
            <h1>华创生电机</h1>
            <p>德昌电机授权代理商 · 专业电机解决方案提供商</p>
        </div>
    </div>
</body>
</html>
