<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华创生电机 - 德昌电机集团大中华区代理商</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a1628;
        }

        /* Banner 区域 */
        .banner {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 600px;
            overflow: hidden;
            display: flex;
        }

        /* 左侧深色区域 */
        .banner-left {
            flex: 1;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 50%, #0f2944 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
            position: relative;
        }

        /* 左侧背景装饰 */
        .banner-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 100, 200, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        /* 黄色标签 */
        .brand-tag {
            display: inline-block;
            background: #f5a623;
            color: #fff;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            width: fit-content;
        }

        /* 副标题 */
        .banner-subtitle {
            color: #f5a623;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 400;
        }

        /* 主标题 */
        .banner-title {
            color: #fff;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        /* 英文标语 */
        .banner-en {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-family: "Times New Roman", serif;
            font-style: italic;
        }

        /* 分隔线 */
        .divider {
            width: 60px;
            height: 3px;
            background: #f5a623;
            margin-bottom: 25px;
        }

        /* 描述文字 */
        .banner-desc {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            line-height: 1.8;
            max-width: 500px;
        }

        /* 右侧黄色区域 */
        .banner-right {
            width: 45%;
            min-width: 500px;
            background: linear-gradient(135deg, #d4a84b 0%, #c49a3d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* 产品网格 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .product-card {
            background: #fff;
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .product-card-placeholder {
            font-size: 40px;
            color: #ccc;
        }

        /* 切换箭头 */
        .banner-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .banner-arrow:hover {
            background: rgba(255,255,255,0.2);
        }

        .banner-arrow.prev { left: 0; border-radius: 0 4px 4px 0; }
        .banner-arrow.next { right: 0; border-radius: 4px 0 0 4px; }

        /* 轮播指示点 */
        .banner-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active {
            background: #f5a623;
            width: 30px;
            border-radius: 5px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .banner { flex-direction: column; height: auto; }
            .banner-left { padding: 60px 40px; min-height: 50vh; }
            .banner-right { width: 100%; min-width: auto; padding: 40px; }
            .banner-title { font-size: 36px; }
            .product-grid { max-width: 350px; }
        }

        @media (max-width: 768px) {
            .banner-left { padding: 40px 20px; }
            .banner-title { font-size: 28px; letter-spacing: 2px; }
            .banner-subtitle { font-size: 16px; }
            .banner-desc { font-size: 14px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .banner-arrow { width: 40px; height: 60px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <section class="banner">
        <!-- 左侧内容区 -->
        <div class="banner-left">
            <div class="brand-tag">深圳华创生电机</div>
            <div class="banner-subtitle">——德昌电机集团大中华区代理商</div>
            <h1 class="banner-title">驱动低碳未来</h1>
            <div class="banner-en">Driving a low-carbon future</div>
            <div class="divider"></div>
            <p class="banner-desc">成为全球创新及可靠动力系统必然之选</p>
        </div>

        <!-- 右侧产品展示区 -->
        <div class="banner-right">
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-card-placeholder">⚙️</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">🔧</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">⚡</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">🔌</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">🛠️</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">⚙️</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">🔋</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">🔩</div>
                </div>
                <div class="product-card">
                    <div class="product-card-placeholder">⚙️</div>
                </div>
            </div>
        </div>

        <!-- 切换箭头 -->
        <button class="banner-arrow prev">‹</button>
        <button class="banner-arrow next">›</button>

        <!-- 轮播点 -->
        <div class="banner-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <script>
        // 简单的轮播功能
        const slides = [
            {
                tag: '深圳华创生电机',
                subtitle: '——德昌电机集团大中华区代理商',
                title: '驱动低碳未来',
                en: 'Driving a low-carbon future',
                desc: '成为全球创新及可靠动力系统必然之选'
            },
            {
                tag: '专业电机解决方案',
                subtitle: '——20年行业经验',
                title: '专注品质服务',
                en: 'Focus on quality service',
                desc: '服务500+企业客户，1000+产品型号'
            },
            {
                tag: '德昌电机授权代理',
                subtitle: '——原厂正品保障',
                title: '值得信赖的伙伴',
                en: 'A trustworthy partner',
                desc: '提供全系列电机产品及专业技术支持'
            }
        ];

        let currentSlide = 0;
        const dots = document.querySelectorAll('.dot');
        const prevBtn = document.querySelector('.banner-arrow.prev');
        const nextBtn = document.querySelector('.banner-arrow.next');

        function updateSlide(index) {
            const slide = slides[index];
            document.querySelector('.brand-tag').textContent = slide.tag;
            document.querySelector('.banner-subtitle').textContent = slide.subtitle;
            document.querySelector('.banner-title').textContent = slide.title;
            document.querySelector('.banner-en').textContent = slide.en;
            document.querySelector('.banner-desc').textContent = slide.desc;
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        prevBtn.addEventListener('click', () => {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateSlide(currentSlide);
        });

        nextBtn.addEventListener('click', () => {
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlide(currentSlide);
        });

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                currentSlide = index;
                updateSlide(currentSlide);
            });
        });

        // 自动轮播
        setInterval(() => {
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlide(currentSlide);
        }, 5000);
    </script>
</body>
</html>
