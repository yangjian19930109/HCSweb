<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华创生 · 产品管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.topbar{background:#0f0f23;border-bottom:2px solid #005d73;padding:0 30px;display:flex;align-items:center;height:60px;gap:20px}
.topbar h1{color:#00f5ff;font-size:20px;font-weight:700;flex:1}
.topbar a{color:#888;text-decoration:none;font-size:13px;transition:color .2s}
.topbar a:hover{color:#00f5ff}
.main{padding:24px 30px;max-width:1200px}
.section-title{color:#ff2d78;font-size:15px;font-weight:700;margin:24px 0 12px;border-left:3px solid #ff2d78;padding-left:10px}
.section-title:first-child{margin-top:0}
.form-card{background:#16213e;border-radius:12px;border:1px solid #333;padding:20px 24px;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.form-grid.col2{grid-template-columns:repeat(2,1fr)}
.form-full{grid-column:1/-1}
.form-card label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-card input,.form-card select,.form-card textarea{width:100%;padding:9px 12px;background:#1a1a2e;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:14px;font-family:inherit}
.form-card input:focus,.form-card select:focus,.form-card textarea:focus{outline:none;border-color:#00f5ff;box-shadow:0 0 8px rgba(0,245,255,0.15)}
.form-card textarea{resize:vertical;min-height:60px}
.form-card .hint{font-size:11px;color:#666;margin-top:2px}
.btn-row{display:flex;gap:10px;margin-top:8px}
.btn{padding:9px 22px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;transition:all .2s}
.btn-primary{background:#005d73;color:#fff}.btn-primary:hover{background:#007a99}
.btn-success{background:#ff2d78;color:#fff}.btn-success:hover{background:#ff5080;box-shadow:0 0 15px rgba(255,45,120,0.4)}
.btn-danger{background:#8b1a1a;color:#fff}.btn-danger:hover{background:#b02020}
.btn-sm{padding:5px 12px;font-size:12px}
.table-wrap{background:#16213e;border-radius:12px;border:1px solid #333;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:#0f3460}
thead th{text-align:left;padding:10px 14px;font-size:12px;color:#00f5ff;font-weight:600;border-bottom:2px solid #005d73}
tbody tr{border-bottom:1px solid #1f2a45;transition:background .2s}
tbody tr:hover{background:#1f2a45}
tbody td{padding:9px 14px;font-size:13px;color:#ccc;vertical-align:middle}
.cat-badge{display:inline-block;padding:2px 8px;background:#005d73;color:#00f5ff;border-radius:3px;font-size:11px;margin-right:4px}
.subcat-badge{display:inline-block;padding:2px 8px;background:#3a1a5e;color:#c084fc;border-radius:3px;font-size:11px}
.model-tag{font-family:monospace;background:#1a1a2e;padding:2px 6px;border-radius:3px;color:#00f5ff;font-size:12px}
.toast{position:fixed;bottom:30px;right:30px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast-success{background:#1a6b4a;color:#fff}.toast-error{background:#8b1a1a;color:#fff}
.toast.show{opacity:1}
.stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#16213e;border-radius:10px;border:1px solid #333;padding:16px 24px;min-width:120px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:#00f5ff;font-family:monospace}
.stat-card .lbl{font-size:12px;color:#888;margin-top:4px}
.img-upload-row{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.img-upload-item{flex:1;min-width:160px;max-width:220px}
.img-upload-item label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.img-upload-item input[type=file]{display:none}
.img-upload-box{width:100%;aspect-ratio:4/3;background:#1a1a2e;border:2px dashed #333;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;overflow:hidden;position:relative}
.img-upload-box:hover{border-color:#00f5ff;box-shadow:0 0 10px rgba(0,245,255,0.1)}
.img-upload-box img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.img-upload-box .placeholder{font-size:28px;color:#444;pointer-events:none}
.img-upload-box .placeholder span{display:block;font-size:10px;margin-top:4px}
</style>
</head>
<body>
<div class="topbar">
  <h1>华创生 · 产品管理</h1>
  <a href="/">← 返回官网</a>
</div>
<div class="main">
  <div class="section-title">新增产品</div>
  <div class="form-card">
    <div class="form-grid">
      <div>
        <label>产品ID *</label>
        <input id="fId" placeholder="如：motor-001">
        <div class="hint">唯一标识，英文+数字</div>
      </div>
      <div>
        <label>产品名称 *</label>
        <input id="fTitle" placeholder="如：1030 节气门电机">
      </div>
      <div>
        <label>产品链接</label>
        <input id="fUrl" readonly style="color:#666;background:#111;cursor:not-allowed" value="系统自动生成">
        <div class="hint">有详情→product-{id}.html / 无详情→products.html#tab-xxx</div>
      </div>
    </div>
    <div class="form-grid">
      <div>
        <label>分类 *</label>
        <select id="fCat"><option value="">-- 选择分类 --</option></select>
      </div>
      <div>
        <label>子分类</label>
        <select id="fSubCat"><option value="">-- 选择子分类 --</option></select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-full">
        <label>描述 *</label>
        <textarea id="fDesc" placeholder="产品简短描述，用于搜索结果展示"></textarea>
      </div>
    </div>
    <div class="section-title" style="margin-top:0">商品主图 <span style="font-weight:400;color:#888;font-size:12px">（最多3张）</span></div>
    <div class="form-card">
      <div class="img-upload-row">
        <div class="img-upload-item"><label>图片 1</label><input type="file" id="img1" accept="image/*" onchange="previewImage(1)"><div class="img-upload-box" id="box1" onclick="document.getElementById('img1').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
        <div class="img-upload-item"><label>图片 2</label><input type="file" id="img2" accept="image/*" onchange="previewImage(2)"><div class="img-upload-box" id="box2" onclick="document.getElementById('img2').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
        <div class="img-upload-item"><label>图片 3</label><input type="file" id="img3" accept="image/*" onchange="previewImage(3)"><div class="img-upload-box" id="box3" onclick="document.getElementById('img3').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
      </div>
    </div>
    <div class="section-title" style="margin-top:0">商品详情 <span style="font-weight:400;color:#888;font-size:12px">（不参与搜索）</span></div>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-full">
          <label>详情内容（HTML）</label>
          <textarea id="fDetail" placeholder="&lt;h3&gt;产品介绍&lt;/h3&gt;&lt;p&gt;详细描述...&lt;/p&gt;" style="min-height:160px;font-family:monospace;font-size:13px"></textarea>
          <div class="hint">支持 HTML 标签，引用图片用 &lt;img src="图片路径"&gt;</div>
        </div>
      </div>
      <div class="img-upload-row" id="detailImgRow">
        <div class="img-upload-item"><label>详情图 1</label><input type="file" id="dimg1" accept="image/*" onchange="previewDetailImg(1)"><div class="img-upload-box" id="dbox1" onclick="document.getElementById('dimg1').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
        <div class="img-upload-item"><label>详情图 2</label><input type="file" id="dimg2" accept="image/*" onchange="previewDetailImg(2)"><div class="img-upload-box" id="dbox2" onclick="document.getElementById('dimg2').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
        <div class="img-upload-item"><label>详情图 3</label><input type="file" id="dimg3" accept="image/*" onchange="previewDetailImg(3)"><div class="img-upload-box" id="dbox3" onclick="document.getElementById('dimg3').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
        <div class="img-upload-item"><label>详情图 4</label><input type="file" id="dimg4" accept="image/*" onchange="previewDetailImg(4)"><div class="img-upload-box" id="dbox4" onclick="document.getElementById('dimg4').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
        <div class="img-upload-item"><label>详情图 5</label><input type="file" id="dimg5" accept="image/*" onchange="previewDetailImg(5)"><div class="img-upload-box" id="dbox5" onclick="document.getElementById('dimg5').click()"><div class="placeholder">📷<span>点击上传</span></div></div></div>
      </div>
      <div class="hint" style="margin-top:4px">详情图片上传后，在详情内容中用 &lt;img src="images/products/文件名"&gt; 引用</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" id="saveBtn" onclick="saveProduct()">保存产品</button>
      <button class="btn btn-primary" onclick="clearForm()">清空</button>
      <button class="btn btn-primary" id="cancelEditBtn" onclick="clearForm()" style="display:none">取消编辑</button>
    </div>
  </div>

  <div class="section-title">产品列表 <span style="font-weight:400;color:#888;font-size:13px" id="countLabel"></span><button class="btn btn-danger btn-sm" id="batchDelBtn" onclick="batchDelete()" style="display:none;margin-left:12px">批量删除</button></div>
  <div class="table-wrap">
    <table>
      <thead><tr><th style="width:36px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()" title="全选"></th><th>ID</th><th>名称</th><th>分类</th><th>子分类</th><th>描述</th><th style="width:120px">操作</th></tr></thead>
      <tbody id="productList"></tbody>
    </table>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var categories = [];
var products = [];
var subCatMap = {};
var editProductId = null;

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + (type||'success') + ' show';
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

async function loadAll() {
  try {
    var r = await fetch('/api/categories');
    categories = await r.json();
    var sel = document.getElementById('fCat');
    sel.innerHTML = '<option value="">-- 选择分类 --</option>';
    categories.forEach(function(c){
      sel.innerHTML += '<option value="'+c.name+'">'+c.name+'</option>';
      subCatMap[c.name] = c.subCategories || [];
    });
    document.getElementById('fCat').onchange = updateSubCats;
  } catch(e) { showToast('加载分类失败', 'error'); }

  try {
    var r2 = await fetch('/api/products');
    products = await r2.json();
    document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
    renderTable();
  } catch(e) { showToast('加载产品失败', 'error'); }
}

function updateSubCats() {
  var cat = document.getElementById('fCat').value;
  var sel = document.getElementById('fSubCat');
  sel.innerHTML = '<option value="">-- 选择子分类 --</option>';
  (subCatMap[cat] || []).forEach(function(s){
    sel.innerHTML += '<option value="'+s+'">'+s+'</option>';
  });
}

function renderTable() {
  var tb = document.getElementById('productList');
  if (!products.length) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#666">暂无产品</td></tr>';
    return;
  }
  var html = '';
  products.forEach(function(p){
    html += '<tr>'+
      '<td><input type="checkbox" class="row-check" value="'+esc(p.id)+'" onchange="updateBatchBtn()"></td>'+
      '<td><span class="model-tag">'+esc(p.id)+'</span></td>'+
      '<td style="color:#e0e0e0;font-weight:600">'+esc(p.title)+'</td>'+
      '<td><span class="cat-badge">'+esc(p.cat||'')+'</span></td>'+
      '<td>'+(p.subCat?'<span class="subcat-badge">'+esc(p.subCat)+'</span>':'<span style="color:#444">-</span>')+'</td>'+
      '<td style="color:#888;font-size:12px;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(p.desc||'')+'">'+esc(p.desc||'')+'</td>'+
      '<td><button class="btn btn-primary btn-sm" onclick="editProduct(\''+esc(p.id)+'\')">编辑</button> <button class="btn btn-danger btn-sm" onclick="delProduct(\''+esc(p.id)+'\')">删除</button></td>'+
    '</tr>';
  });
  tb.innerHTML = html;
  document.getElementById('selectAll').checked = false;
  document.getElementById('batchDelBtn').style.display = 'none';
}

function esc(s) {
  if (s == null || s == undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

function editProduct(id) {
  var p = products.find(function(p){ return p.id === id; });
  if (!p) return;
  editProductId = id;
  document.getElementById('fId').value = p.id;
  document.getElementById('fId').readOnly = true;
  document.getElementById('fId').style.background = '#111';
  document.getElementById('fTitle').value = p.title;
  document.getElementById('fCat').value = p.cat || '';
  updateSubCats();
  document.getElementById('fSubCat').value = p.subCat || '';
  document.getElementById('fDesc').value = p.desc || '';
  document.getElementById('fDetail').value = p.detail || '';
  // 显示已有图片
  var imgs = p.images || [];
  for (var i=1;i<=3;i++) {
    document.getElementById('img'+i).value = '';
    var box = document.getElementById('box'+i);
    var oldImg = box.querySelector('img');
    if (oldImg) oldImg.remove();
    var ph = box.querySelector('.placeholder');
    if (imgs[i-1]) {
      if (ph) ph.style.display = 'none';
      var img = document.createElement('img');
      img.src = '/' + imgs[i-1];
      img.setAttribute('data-keep', imgs[i-1]);
      box.appendChild(img);
    } else {
      if (ph) ph.style.display = '';
    }
  }
  var dimgs = p.detail_images || [];
  for (var i=1;i<=5;i++) {
    document.getElementById('dimg'+i).value = '';
    var dbox = document.getElementById('dbox'+i);
    var oldDimg = dbox.querySelector('img');
    if (oldDimg) oldDimg.remove();
    var dph = dbox.querySelector('.placeholder');
    if (dimgs[i-1]) {
      if (dph) dph.style.display = 'none';
      var dimg = document.createElement('img');
      dimg.src = '/' + dimgs[i-1];
      dimg.setAttribute('data-keep', dimgs[i-1]);
      dbox.appendChild(dimg);
    } else {
      if (dph) dph.style.display = '';
    }
  }
  document.getElementById('saveBtn').textContent = '更新产品';
  document.getElementById('cancelEditBtn').style.display = 'inline-block';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function clearForm() {
  editProductId = null;
  ['fId','fTitle','fDesc','fDetail'].forEach(function(id){
    var el = document.getElementById(id);
    el.value = '';
    el.readOnly = false;
    el.style.background = '';
  });
  document.getElementById('fCat').value='';
  document.getElementById('fSubCat').innerHTML='<option value="">-- 选择子分类 --</option>';
  document.getElementById('saveBtn').textContent = '保存产品';
  document.getElementById('cancelEditBtn').style.display = 'none';
  for (var i=1;i<=3;i++) {
    document.getElementById('img'+i).value='';
    var box = document.getElementById('box'+i);
    var img = box.querySelector('img');
    if (img) img.remove();
    var ph = box.querySelector('.placeholder');
    if (ph) ph.style.display='';
  }
  for (var i=1;i<=5;i++) {
    document.getElementById('dimg'+i).value='';
    var dbox = document.getElementById('dbox'+i);
    var dimg = dbox.querySelector('img');
    if (dimg) dimg.remove();
    var dph = dbox.querySelector('.placeholder');
    if (dph) dph.style.display='';
  }
}

function previewImage(n) {
  var file = document.getElementById('img'+n).files[0];
  var box = document.getElementById('box'+n);
  previewFileInBox(file, box);
}
function previewDetailImg(n) {
  var file = document.getElementById('dimg'+n).files[0];
  var box = document.getElementById('dbox'+n);
  previewFileInBox(file, box);
}
function previewFileInBox(file, box) {
  var existing = box.querySelector('img');
  if (existing) existing.remove();
  var ph = box.querySelector('.placeholder');
  if (!file) {
    if (ph) ph.style.display='';
    return;
  }
  if (ph) ph.style.display='none';
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.createElement('img');
    img.src = e.target.result;
    box.appendChild(img);
  };
  reader.readAsDataURL(file);
}

async function saveProduct() {
  var id = document.getElementById('fId').value.trim();
  var title = document.getElementById('fTitle').value.trim();
  var cat = document.getElementById('fCat').value;
  var subCat = document.getElementById('fSubCat').value;
  var desc = document.getElementById('fDesc').value.trim();

  if (!id || !title) { showToast('产品ID和名称必填', 'error'); return; }
  if (!cat) { showToast('请选择分类', 'error'); return; }

  var detail = document.getElementById('fDetail').value.trim();
  var isEdit = !!editProductId;

  var fd = new FormData();
  if (!isEdit) fd.append('id', id);
  fd.append('title', title);
  fd.append('cat', cat);
  fd.append('subCat', subCat);
  fd.append('desc', desc);
  fd.append('detail', detail);

  // 保留的旧图片路径
  if (isEdit) {
    var keepImgs = [];
    for (var i=1;i<=3;i++) {
      var box = document.getElementById('box'+i);
      var img = box.querySelector('img[data-keep]');
      if (img) keepImgs.push(img.getAttribute('data-keep'));
    }
    fd.append('keep_images', JSON.stringify(keepImgs));
    var keepDimgs = [];
    for (var i=1;i<=5;i++) {
      var dbox = document.getElementById('dbox'+i);
      var dimg = dbox.querySelector('img[data-keep]');
      if (dimg) keepDimgs.push(dimg.getAttribute('data-keep'));
    }
    fd.append('keep_detail_images', JSON.stringify(keepDimgs));
  }

  for (var i=1;i<=3;i++) {
    var f = document.getElementById('img'+i).files[0];
    if (f) fd.append('image'+i, f);
  }
  for (var i=1;i<=5;i++) {
    var df = document.getElementById('dimg'+i).files[0];
    if (df) fd.append('detail_'+i, df);
  }

  try {
    var url = isEdit ? '/api/products/' + encodeURIComponent(editProductId) : '/api/products';
    var method = isEdit ? 'PUT' : 'POST';
    var r = await fetch(url, {method: method, body: fd});
    var d = await r.json();
    if (d.ok) {
      showToast(isEdit ? '产品已更新: ' + title : '产品已添加: ' + title);
      if (isEdit) {
        var idx = products.findIndex(function(p){ return p.id === editProductId; });
        if (idx >= 0) products[idx] = d.product;
      } else {
        products.push(d.product);
      }
      clearForm();
      document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
      renderTable();
    } else {
      showToast((d.errors||['未知错误']).join('；'), 'error');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, 'error');
  }
}

function toggleSelectAll() {
  var checked = document.getElementById('selectAll').checked;
  document.querySelectorAll('.row-check').forEach(function(cb){ cb.checked = checked; });
  updateBatchBtn();
}

function updateBatchBtn() {
  var checked = document.querySelectorAll('.row-check:checked');
  var btn = document.getElementById('batchDelBtn');
  btn.style.display = checked.length > 0 ? 'inline-block' : 'none';
  btn.textContent = '批量删除(' + checked.length + ')';
}

async function batchDelete() {
  var checked = document.querySelectorAll('.row-check:checked');
  var ids = Array.from(checked).map(function(cb){ return cb.value; });
  if (!ids.length) return;
  if (!confirm('确定删除选中的 ' + ids.length + ' 个产品吗？此操作不可恢复。')) return;
  try {
    var r = await fetch('/api/products/batch-delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ids: ids})
    });
    var d = await r.json();
    if (d.ok) {
      showToast('已批量删除 ' + d.deleted + ' 个产品');
      products = products.filter(function(p){ return ids.indexOf(p.id) === -1; });
      document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
      document.getElementById('selectAll').checked = false;
      renderTable();
    } else {
      showToast(d.error||'删除失败', 'error');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, 'error');
  }
}

async function delProduct(id) {
  if (!confirm('确定删除产品 "'+id+'" 吗？此操作不可恢复。')) return;
  try {
    var r = await fetch('/api/products/'+encodeURIComponent(id), {method:'DELETE'});
    var d = await r.json();
    if (d.ok) {
      showToast('已删除: '+id);
      products = products.filter(function(p){ return p.id !== id; });
      document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
      renderTable();
    } else {
      showToast(d.error||'删除失败', 'error');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, 'error');
  }
}

loadAll();
</script>
</body>
</html>
