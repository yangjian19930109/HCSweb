<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华创生 · 产品管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.topbar{background:#0f0f23;border-bottom:2px solid #005d73;padding:0 30px;display:flex;align-items:center;height:60px;gap:20px}
.topbar h1{color:#00f5ff;font-size:20px;font-weight:700;flex:1}
.topbar a{color:#888;text-decoration:none;font-size:13px;transition:color .2s}
.topbar a:hover{color:#00f5ff}
.main{padding:24px 30px;max-width:1200px}
.section-title{color:#ff2d78;font-size:15px;font-weight:700;margin:24px 0 12px;border-left:3px solid #ff2d78;padding-left:10px}
.section-title:first-child{margin-top:0}
.form-card{background:#16213e;border-radius:12px;border:1px solid #333;padding:20px 24px;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.form-grid.col2{grid-template-columns:repeat(2,1fr)}
.form-full{grid-column:1/-1}
.form-card label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-card input,.form-card select,.form-card textarea{width:100%;padding:9px 12px;background:#1a1a2e;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:14px;font-family:inherit}
.form-card input:focus,.form-card select:focus,.form-card textarea:focus{outline:none;border-color:#00f5ff;box-shadow:0 0 8px rgba(0,245,255,0.15)}
.form-card textarea{resize:vertical;min-height:60px}
.form-card .hint{font-size:11px;color:#666;margin-top:2px}
.btn-row{display:flex;gap:10px;margin-top:8px}
.btn{padding:9px 22px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;transition:all .2s}
.btn-primary{background:#005d73;color:#fff}.btn-primary:hover{background:#007a99}
.btn-success{background:#ff2d78;color:#fff}.btn-success:hover{background:#ff5080;box-shadow:0 0 15px rgba(255,45,120,0.4)}
.btn-danger{background:#8b1a1a;color:#fff}.btn-danger:hover{background:#b02020}
.btn-sm{padding:5px 12px;font-size:12px}
.table-wrap{background:#16213e;border-radius:12px;border:1px solid #333;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:#0f3460}
thead th{text-align:left;padding:10px 14px;font-size:12px;color:#00f5ff;font-weight:600;border-bottom:2px solid #005d73}
tbody tr{border-bottom:1px solid #1f2a45;transition:background .2s}
tbody tr:hover{background:#1f2a45}
tbody td{padding:9px 14px;font-size:13px;color:#ccc;vertical-align:middle}
.cat-badge{display:inline-block;padding:2px 8px;background:#005d73;color:#00f5ff;border-radius:3px;font-size:11px;margin-right:4px}
.subcat-badge{display:inline-block;padding:2px 8px;background:#3a1a5e;color:#c084fc;border-radius:3px;font-size:11px}
.model-tag{font-family:monospace;background:#1a1a2e;padding:2px 6px;border-radius:3px;color:#00f5ff;font-size:12px}
.toast{position:fixed;bottom:30px;right:30px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast-success{background:#1a6b4a;color:#fff}.toast-error{background:#8b1a1a;color:#fff}
.toast.show{opacity:1}
.stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#16213e;border-radius:10px;border:1px solid #333;padding:16px 24px;min-width:120px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:#00f5ff;font-family:monospace}
.stat-card .lbl{font-size:12px;color:#888;margin-top:4px}
.img-grid{display:flex;gap:12px;flex-wrap:wrap;min-height:80px;padding:8px;background:#1a1a2e;border-radius:8px;border:2px dashed #333}
.img-grid-item{width:140px;height:105px;border-radius:6px;overflow:hidden;position:relative;cursor:grab;border:2px solid transparent;transition:border-color .2s}
.img-grid-item:active{cursor:grabbing}
.img-grid-item img{width:100%;height:100%;object-fit:cover}
.img-grid-item.drag-over{border-color:#00f5ff;box-shadow:0 0 10px rgba(0,245,255,0.3)}
.img-grid-item .del-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(255,45,120,0.85);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;z-index:5;line-height:1}
.img-grid-item .del-btn:hover{background:#ff2d78}
.img-grid-item .keep-badge{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,0.7);color:#0f0;font-size:9px;padding:1px 5px;border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <h1>华创生 · 产品管理</h1>
  <a href="/">← 返回官网</a>
</div>
<div class="main">
  <div class="section-title">新增产品</div>
  <div class="form-card">
    <div class="form-grid">
      <div>
        <label>产品ID *</label>
        <input id="fId" placeholder="如：motor-001">
        <div class="hint">唯一标识，英文+数字</div>
      </div>
      <div>
        <label>产品名称 *</label>
        <input id="fTitle" placeholder="如：1030 节气门电机">
      </div>
      <div>
        <label>产品链接</label>
        <input id="fUrl" readonly style="color:#666;background:#111;cursor:not-allowed" value="系统自动生成">
        <div class="hint">有详情→product-{id}.html / 无详情→products.html#tab-xxx</div>
      </div>
    </div>
    <div class="form-grid">
      <div>
        <label>分类 *</label>
        <select id="fCat"><option value="">-- 选择分类 --</option></select>
      </div>
      <div>
        <label>子分类</label>
        <select id="fSubCat"><option value="">-- 选择子分类 --</option></select>
      </div>
    </div>
    <div class="form-grid">
      <div>
        <label>产品类型</label>
        <select id="fType"><option value="">-- 选择类型 --</option></select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-full">
        <label>规格参数 <span style="font-weight:400;color:#888;font-size:11px">（可选，键值对）</span></label>
        <div id="specsEditor" style="margin-top:4px"></div>
        <button class="btn btn-primary btn-sm" onclick="addSpecRow()" style="margin-top:6px">+ 加规格</button>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-full">
        <label>描述 *</label>
        <textarea id="fDesc" placeholder="产品简短描述，用于搜索结果展示"></textarea>
      </div>
    </div>
    <div class="section-title" style="margin-top:0">商品主图 <span style="font-weight:400;color:#888;font-size:12px">（拖拽排序，最多6张）</span></div>
    <div class="form-card">
      <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1;min-width:300px">
          <input type="file" id="mainImgInput" accept="image/*" multiple onchange="handleMainImgSelect()" style="display:none">
          <div class="img-grid" id="mainImgGrid"></div>
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('mainImgInput').click()" style="margin-top:8px">+ 上传主图</button>
        </div>
        <div style="width:180px">
          <label style="display:block;font-size:12px;color:#888;margin-bottom:4px">卡片封面图</label>
          <input type="file" id="cardImgInput" accept="image/*" onchange="handleCardImgSelect()" style="display:none">
          <div id="cardImgBox" onclick="document.getElementById('cardImgInput').click()" style="width:100%;aspect-ratio:1/1;background:#1a1a2e;border:2px dashed #333;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:border-color .2s">
            <div id="cardImgPlaceholder" style="font-size:24px;color:#444;text-align:center">📷<span style="display:block;font-size:10px;margin-top:4px">卡片封面</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="section-title" style="margin-top:0">商品详情 <span style="font-weight:400;color:#888;font-size:12px">（不参与搜索）</span></div>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-full">
          <label>详情内容（HTML）</label>
          <textarea id="fDetail" placeholder="&lt;h3&gt;产品介绍&lt;/h3&gt;&lt;p&gt;详细描述...&lt;/p&gt;" style="min-height:160px;font-family:monospace;font-size:13px"></textarea>
          <div class="hint">支持 HTML 标签，引用图片用 &lt;img src="图片路径"&gt;</div>
        </div>
      </div>
      <input type="file" id="detailImgInput" accept="image/*" multiple onchange="handleDetailImgSelect()" style="display:none">
      <div class="img-grid" id="detailImgGrid"></div>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('detailImgInput').click()" style="margin-top:8px">+ 上传详情图</button>
      <div class="hint" style="margin-top:4px">详情图片上传后，在详情内容中用 &lt;img src="images/products/文件名"&gt; 引用</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" id="saveBtn" onclick="saveProduct()">保存产品</button>
      <button class="btn btn-primary" onclick="clearForm()">清空</button>
      <button class="btn btn-primary" id="cancelEditBtn" onclick="clearForm()" style="display:none">取消编辑</button>
    </div>
  </div>

  <div class="section-title">产品列表 <span style="font-weight:400;color:#888;font-size:13px" id="countLabel"></span><button class="btn btn-danger btn-sm" id="batchDelBtn" onclick="batchDelete()" style="display:none;margin-left:12px">批量删除</button></div>
  <div class="table-wrap">
    <table>
      <thead><tr><th style="width:36px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()" title="全选"></th><th>ID</th><th>名称</th><th>分类</th><th>子分类</th><th>描述</th><th style="width:120px">操作</th></tr></thead>
      <tbody id="productList"></tbody>
    </table>
  </div>

  <div class="section-title">分类管理 <button class="btn btn-primary btn-sm" onclick="saveCategories()" style="margin-left:12px">保存分类</button></div>
  <div class="form-card" id="catMgr"></div>

  <div class="section-title">操作日志 <span style="font-weight:400;color:#888;font-size:13px" id="auditCount"></span></div>
  <div class="table-wrap">
    <table>
      <thead><tr><th style="width:140px">时间</th><th style="width:80px">动作</th><th style="width:100px">产品ID</th><th>摘要</th></tr></thead>
      <tbody id="auditList"></tbody>
    </table>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var categories = [];
var products = [];
var subCatMap = {};
var editProductId = null;

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + (type||'success') + ' show';
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

async function loadAll() {
  try {
    var r = await fetch('/api/categories');
    categories = await r.json();
    var sel = document.getElementById('fCat');
    sel.innerHTML = '<option value="">-- 选择分类 --</option>';
    categories.forEach(function(c){
      sel.innerHTML += '<option value="'+c.name+'">'+c.name+'</option>';
      subCatMap[c.name] = c.subCategories || [];
    });
    document.getElementById('fCat').onchange = function(){ updateSubCats(); autoUpdateSpecs(); };
    document.getElementById('fSubCat').onchange = autoUpdateSpecs;
    document.getElementById('fType').onchange = autoUpdateSpecs;
    renderCatMgr();
  } catch(e) { showToast('加载分类失败', 'error'); }

  try {
    var r2 = await fetch('/api/products');
    products = await r2.json();
    document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
    renderTable();
  } catch(e) { showToast('加载产品失败', 'error'); }
}

function updateSubCats() {
  var cat = document.getElementById('fCat').value;
  var sel = document.getElementById('fSubCat');
  sel.innerHTML = '<option value="">-- 选择子分类 --</option>';
  (subCatMap[cat] || []).forEach(function(s){
    sel.innerHTML += '<option value="'+s+'">'+s+'</option>';
  });
  updateTypeOptions(cat);
}

function updateTypeOptions(cat) {
  var sel = document.getElementById('fType');
  var types = [];
  var catObj = categories.find(function(c){ return c.name === cat; });
  if (catObj && catObj.productTypes) {
    types = catObj.productTypes;
  }
  sel.innerHTML = '<option value="">-- 选择类型 --</option>';
  types.forEach(function(t){
    sel.innerHTML += '<option value="'+t+'">'+t+'</option>';
  });
  sel.style.display = types.length ? '' : 'none';
  sel.parentElement.querySelector('label').style.display = types.length ? '' : 'none';
}

function renderTable() {
  var tb = document.getElementById('productList');
  if (!products.length) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#666">暂无产品</td></tr>';
    return;
  }
  var html = '';
  products.forEach(function(p){
    html += '<tr>'+
      '<td><input type="checkbox" class="row-check" value="'+esc(p.id)+'" onchange="updateBatchBtn()"></td>'+
      '<td><span class="model-tag">'+esc(p.id)+'</span></td>'+
      '<td style="color:#e0e0e0;font-weight:600">'+esc(p.title)+'</td>'+
      '<td><span class="cat-badge">'+esc(p.cat||'')+'</span></td>'+
      '<td>'+(p.subCat?'<span class="subcat-badge">'+esc(p.subCat)+'</span>':'<span style="color:#444">-</span>')+'</td>'+
      '<td style="color:#888;font-size:12px;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(p.desc||'')+'">'+esc(p.desc||'')+'</td>'+
      '<td><button class="btn btn-primary btn-sm" onclick="editProduct(\''+esc(p.id)+'\')">编辑</button> <button class="btn btn-danger btn-sm" onclick="delProduct(\''+esc(p.id)+'\')">删除</button></td>'+
    '</tr>';
  });
  tb.innerHTML = html;
  document.getElementById('selectAll').checked = false;
  document.getElementById('batchDelBtn').style.display = 'none';
}

function esc(s) {
  if (s == null || s == undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

function editProduct(id) {
  var p = products.find(function(p){ return p.id === id; });
  if (!p) return;
  editProductId = id;
  document.getElementById('fId').value = p.id;
  document.getElementById('fId').readOnly = true;
  document.getElementById('fId').style.background = '#111';
  document.getElementById('fTitle').value = p.title;
  document.getElementById('fCat').value = p.cat || '';
  updateSubCats();
  document.getElementById('fSubCat').value = p.subCat || '';
  document.getElementById('fDesc').value = p.desc || '';
  document.getElementById('fDetail').value = p.detail || '';
  updateTypeOptions(p.cat || '');
  document.getElementById('fType').value = p.productType || '';
  loadImgGrids(p);
  setSpecs(p.specs || {});
  document.getElementById('saveBtn').textContent = '更新产品';
  document.getElementById('cancelEditBtn').style.display = 'inline-block';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function clearForm() {
  editProductId = null;
  ['fId','fTitle','fDesc','fDetail'].forEach(function(id){
    var el = document.getElementById(id);
    el.value = '';
    el.readOnly = false;
    el.style.background = '';
  });
  document.getElementById('fCat').value='';
  document.getElementById('fSubCat').innerHTML='<option value="">-- 选择子分类 --</option>';
  var fType = document.getElementById('fType');
  fType.innerHTML = '<option value="">-- 选择类型 --</option>';
  fType.style.display = 'none';
  fType.parentElement.querySelector('label').style.display = 'none';
  document.getElementById('saveBtn').textContent = '保存产品';
  document.getElementById('cancelEditBtn').style.display = 'none';
  clearImgGrids();
  specRows = [];
  renderSpecsEditor();
}

// ===== 图片网格管理 =====
var mainImgItems = [];   // {src, keepPath, file}
var detailImgItems = []; // {src, keepPath, file}
var cardImgData = null;  // {src, keepPath, file}
var dragSrc = null;

function renderImgGrid(gridId, items) {
  var grid = document.getElementById(gridId);
  grid.innerHTML = '';
  items.forEach(function(item, idx){
    var div = document.createElement('div');
    div.className = 'img-grid-item';
    div.draggable = true;
    div.setAttribute('data-idx', idx);
    div.ondragstart = function(e){ dragSrc = this; e.dataTransfer.effectAllowed = 'move'; };
    div.ondragover = function(e){ e.preventDefault(); this.classList.add('drag-over'); };
    div.ondragleave = function(){ this.classList.remove('drag-over'); };
    div.ondrop = function(e){
      e.preventDefault();
      this.classList.remove('drag-over');
      var fromIdx = parseInt(dragSrc.getAttribute('data-idx'));
      var toIdx = parseInt(this.getAttribute('data-idx'));
      if (fromIdx !== toIdx) {
        var tmp = items[fromIdx];
        items.splice(fromIdx, 1);
        items.splice(toIdx, 0, tmp);
        renderImgGrid(gridId, items);
      }
    };
    var img = document.createElement('img');
    img.src = item.src;
    div.appendChild(img);
    // 保留标记
    if (item.keepPath) {
      var badge = document.createElement('span');
      badge.className = 'keep-badge';
      badge.textContent = '✓';
      div.appendChild(badge);
    }
    // 删除按钮
    var del = document.createElement('span');
    del.className = 'del-btn';
    del.textContent = '×';
    del.onclick = function(e){
      e.stopPropagation();
      items.splice(idx, 1);
      renderImgGrid(gridId, items);
    };
    div.appendChild(del);
    grid.appendChild(div);
  });
}

function addFilesToGrid(items, files, maxCount) {
  var remaining = maxCount - items.length;
  var toAdd = Math.min(files.length, remaining);
  for (var i=0; i<toAdd; i++) {
    var reader = new FileReader();
    (function(file){
      reader.onload = function(e){
        items.push({src: e.target.result, keepPath: null, file: file});
        renderImgGrid('mainImgGrid', mainImgItems);
        renderImgGrid('detailImgGrid', detailImgItems);
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
}

function handleMainImgSelect() {
  var files = document.getElementById('mainImgInput').files;
  addFilesToGrid(mainImgItems, files, 6);
  document.getElementById('mainImgInput').value = '';
}
function handleDetailImgSelect() {
  var files = document.getElementById('detailImgInput').files;
  addFilesToGrid(detailImgItems, files, 10);
  document.getElementById('detailImgInput').value = '';
}

function handleCardImgSelect() {
  var file = document.getElementById('cardImgInput').files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    cardImgData = {src: e.target.result, keepPath: null, file: file};
    renderCardImg();
  };
  reader.readAsDataURL(file);
  document.getElementById('cardImgInput').value = '';
}

function renderCardImg() {
  var box = document.getElementById('cardImgBox');
  var oldImg = box.querySelector('img');
  if (oldImg) oldImg.remove();
  var oldDel = box.querySelector('.del-btn');
  if (oldDel) oldDel.remove();
  var ph = document.getElementById('cardImgPlaceholder');
  if (cardImgData && cardImgData.src) {
    if (ph) ph.style.display = 'none';
    var img = document.createElement('img');
    img.src = cardImgData.src;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0';
    box.appendChild(img);
    var del = document.createElement('span');
    del.className = 'del-btn';
    del.textContent = '×';
    del.onclick = function(e){ e.stopPropagation(); cardImgData = null; renderCardImg(); };
    box.appendChild(del);
  } else {
    if (ph) ph.style.display = '';
  }
}

function clearImgGrids() {
  mainImgItems = [];
  detailImgItems = [];
  cardImgData = null;
  document.getElementById('mainImgInput').value = '';
  document.getElementById('detailImgInput').value = '';
  document.getElementById('cardImgInput').value = '';
  renderImgGrid('mainImgGrid', mainImgItems);
  renderImgGrid('detailImgGrid', detailImgItems);
  renderCardImg();
}

function loadImgGrids(product) {
  mainImgItems = [];
  detailImgItems = [];
  (product.images||[]).forEach(function(p){
    mainImgItems.push({src: '/'+p, keepPath: p, file: null});
  });
  (product.detail_images||[]).forEach(function(p){
    detailImgItems.push({src: '/'+p, keepPath: p, file: null});
  });
  var cardSrc = product.cardImage || (product.images && product.images[0]) || '';
  if (cardSrc) {
    cardImgData = {src: '/'+cardSrc, keepPath: product.cardImage || '', file: null};
  } else {
    cardImgData = null;
  }
  renderImgGrid('mainImgGrid', mainImgItems);
  renderImgGrid('detailImgGrid', detailImgItems);
  renderCardImg();
}

async function saveProduct() {
  var id = document.getElementById('fId').value.trim();
  var title = document.getElementById('fTitle').value.trim();
  var cat = document.getElementById('fCat').value;
  var subCat = document.getElementById('fSubCat').value;
  var desc = document.getElementById('fDesc').value.trim();

  if (!id || !title) { showToast('产品ID和名称必填', 'error'); return; }
  if (!cat) { showToast('请选择分类', 'error'); return; }

  var detail = document.getElementById('fDetail').value.trim();
  var productType = document.getElementById('fType').value;
  var isEdit = !!editProductId;

  var fd = new FormData();
  if (!isEdit) fd.append('id', id);
  fd.append('title', title);
  fd.append('cat', cat);
  fd.append('subCat', subCat);
  fd.append('desc', desc);
  fd.append('detail', detail);
  fd.append('productType', productType);
  fd.append('specs', JSON.stringify(getSpecs()));

  // 收集图片：保留的旧路径 + 新上传的文件
  var keepImgs = [];
  var newImgIdx = 1;
  for (var i=0; i<mainImgItems.length; i++) {
    if (mainImgItems[i].keepPath) {
      keepImgs.push(mainImgItems[i].keepPath);
    } else if (mainImgItems[i].file) {
      fd.append('image'+newImgIdx, mainImgItems[i].file);
      newImgIdx++;
    }
  }
  fd.append('keep_images', JSON.stringify(keepImgs));

  var keepDimgs = [];
  var newDimgIdx = 1;
  for (var i=0; i<detailImgItems.length; i++) {
    if (detailImgItems[i].keepPath) {
      keepDimgs.push(detailImgItems[i].keepPath);
    } else if (detailImgItems[i].file) {
      fd.append('detail_'+newDimgIdx, detailImgItems[i].file);
      newDimgIdx++;
    }
  }
  fd.append('keep_detail_images', JSON.stringify(keepDimgs));

  // 卡片图片
  if (cardImgData) {
    if (cardImgData.keepPath) {
      fd.append('keep_card_image', cardImgData.keepPath);
    } else if (cardImgData.file) {
      fd.append('card_image', cardImgData.file);
    }
  }

  // 详情文字和图片都为空时警告
  var hasDetailImgs = detailImgItems.length > 0;
  if (!detail && !hasDetailImgs) {
    var hadDetail = isEdit && (products.find(function(p){ return p.id === editProductId; }) || {}).url &&
                    (products.find(function(p){ return p.id === editProductId; }) || {}).url.endsWith('.html');
    var msg = hadDetail ? '详情文字和图片均为空，保存后将失去独立详情页，确定保存吗？' : '详情文字和图片均为空，产品不会生成独立详情页，确定保存吗？';
    if (!confirm(msg)) return;
  }

  try {
    var url = isEdit ? '/api/products/' + encodeURIComponent(editProductId) : '/api/products';
    var method = isEdit ? 'PUT' : 'POST';
    var r = await fetch(url, {method: method, body: fd});
    var d = await r.json();
    if (d.ok) {
      showToast(isEdit ? '产品已更新: ' + title : '产品已添加: ' + title);
      if (isEdit) {
        var idx = products.findIndex(function(p){ return p.id === editProductId; });
        if (idx >= 0) products[idx] = d.product;
      } else {
        products.push(d.product);
      }
      clearForm();
      document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
      renderTable();
      loadAudit();
    } else {
      showToast((d.errors||['未知错误']).join('；'), 'error');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, 'error');
  }
}

function toggleSelectAll() {
  var checked = document.getElementById('selectAll').checked;
  document.querySelectorAll('.row-check').forEach(function(cb){ cb.checked = checked; });
  updateBatchBtn();
}

function updateBatchBtn() {
  var checked = document.querySelectorAll('.row-check:checked');
  var btn = document.getElementById('batchDelBtn');
  btn.style.display = checked.length > 0 ? 'inline-block' : 'none';
  btn.textContent = '批量删除(' + checked.length + ')';
}

async function batchDelete() {
  var checked = document.querySelectorAll('.row-check:checked');
  var ids = Array.from(checked).map(function(cb){ return cb.value; });
  if (!ids.length) return;
  if (!confirm('确定删除选中的 ' + ids.length + ' 个产品吗？此操作不可恢复。')) return;
  try {
    var r = await fetch('/api/products/batch-delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ids: ids})
    });
    var d = await r.json();
    if (d.ok) {
      showToast('已批量删除 ' + d.deleted + ' 个产品');
      products = products.filter(function(p){ return ids.indexOf(p.id) === -1; });
      document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
      document.getElementById('selectAll').checked = false;
      renderTable();
      loadAudit();
    } else {
      showToast(d.error||'删除失败', 'error');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, 'error');
  }
}

async function delProduct(id) {
  if (!confirm('确定删除产品 "'+id+'" 吗？此操作不可恢复。')) return;
  try {
    var r = await fetch('/api/products/'+encodeURIComponent(id), {method:'DELETE'});
    var d = await r.json();
    if (d.ok) {
      showToast('已删除: '+id);
      products = products.filter(function(p){ return p.id !== id; });
      document.getElementById('countLabel').textContent = '('+products.length+' 个产品)';
      renderTable();
      loadAudit();
    } else {
      showToast(d.error||'删除失败', 'error');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, 'error');
  }
}

async function loadAudit() {
  try {
    var r = await fetch('/api/audit');
    var records = await r.json();
    document.getElementById('auditCount').textContent = '(' + records.length + ' 条)';
    var tb = document.getElementById('auditList');
    if (!records.length) {
      tb.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:#666">暂无操作记录</td></tr>';
      return;
    }
    var actionMap = {'add':'新增','edit':'编辑','delete':'删除','batch-delete':'批量删除'};
    var html = '';
    records.forEach(function(r){
      html += '<tr>'+
        '<td style="font-size:12px;color:#888">'+esc(r.time)+'</td>'+
        '<td><span class="cat-badge">'+(actionMap[r.action]||r.action)+'</span></td>'+
        '<td><span class="model-tag">'+esc(r.productId||'')+'</span></td>'+
        '<td style="font-size:12px;color:#aaa">'+esc(r.summary||'')+'</td>'+
      '</tr>';
    });
    tb.innerHTML = html;
  } catch(e) {}
}

// ===== 分类管理 =====
function renderCatMgr() {
  var html = '';
  categories.forEach(function(c, ci){
    html += '<div style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1f2a45">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += '<span class="cat-badge" style="font-size:14px">'+esc(c.name)+'</span>';
    html += '<input value="'+esc(c.name)+'" onchange="categories['+ci+'].name=this.value" style="width:200px;padding:4px 8px;font-size:13px">';
    html += '<button class="btn btn-danger btn-sm" onclick="delCategory('+ci+')">删除分类</button>';
    html += '</div>';
    // 子分类
    html += '<div style="margin-left:16px;margin-bottom:6px"><span style="color:#888;font-size:12px">子分类：</span>';
    (c.subCategories||[]).forEach(function(s, si){
      html += '<span style="display:inline-flex;align-items:center;gap:4px;margin:2px 6px;background:#1a1a2e;padding:2px 8px;border-radius:3px;font-size:12px">';
      html += '<input value="'+esc(s)+'" onchange="categories['+ci+'].subCategories['+si+']=this.value" style="width:120px;padding:2px 6px;font-size:12px;background:transparent;border:none;color:#c084fc">';
      html += '<span onclick="delSubCat('+ci+','+si+')" style="cursor:pointer;color:#f66">×</span>';
      html += '</span>';
    });
    html += '<button class="btn btn-primary btn-sm" onclick="addSubCat('+ci+')" style="font-size:11px;padding:2px 8px">+子分类</button>';
    html += '</div>';
    // 产品类型
    html += '<div style="margin-left:16px"><span style="color:#888;font-size:12px">产品类型：</span>';
    (c.productTypes||[]).forEach(function(t, ti){
      html += '<span style="display:inline-flex;align-items:center;gap:4px;margin:2px 6px;background:#1a1a2e;padding:2px 8px;border-radius:3px;font-size:12px">';
      html += '<input value="'+esc(t)+'" onchange="categories['+ci+'].productTypes['+ti+']=this.value" style="width:120px;padding:2px 6px;font-size:12px;background:transparent;border:none;color:#00f5ff">';
      html += '<span onclick="delType('+ci+','+ti+')" style="cursor:pointer;color:#f66">×</span>';
      html += '</span>';
    });
    html += '<button class="btn btn-primary btn-sm" onclick="addType('+ci+')" style="font-size:11px;padding:2px 8px">+类型</button>';
    html += '</div></div>';
  });
  html += '<button class="btn btn-primary" onclick="addCategory()">+ 新增分类</button>';
  document.getElementById('catMgr').innerHTML = html;
}

function addCategory() {
  categories.push({id:'cat-'+Date.now(), name:'新分类', subCategories:[], productTypes:[]});
  renderCatMgr();
}
function delCategory(i) {
  if (!confirm('确定删除分类 "'+categories[i].name+'" 吗？')) return;
  categories.splice(i,1);
  renderCatMgr();
}
function addSubCat(ci) {
  categories[ci].subCategories.push('新子分类');
  renderCatMgr();
}
function delSubCat(ci, si) {
  categories[ci].subCategories.splice(si,1);
  renderCatMgr();
}
function addType(ci) {
  categories[ci].productTypes.push('新类型');
  renderCatMgr();
}
function delType(ci, ti) {
  categories[ci].productTypes.splice(ti,1);
  renderCatMgr();
}

async function saveCategories() {
  try {
    var r = await fetch('/api/categories/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({categories: categories})
    });
    var d = await r.json();
    if (d.ok) {
      categories = d.categories;
      showToast('分类已保存');
      renderCatMgr();
      // 更新表单的分类下拉
      var sel = document.getElementById('fCat');
      sel.innerHTML = '<option value="">-- 选择分类 --</option>';
      categories.forEach(function(c){
        sel.innerHTML += '<option value="'+c.name+'">'+c.name+'</option>';
        subCatMap[c.name] = c.subCategories || [];
      });
    } else {
      showToast(d.error||'保存失败', 'error');
    }
  } catch(e) {
    showToast('网络错误: '+e.message, 'error');
  }
}

// ===== 规格参数编辑 =====
var specRows = []; // [{key:'', value:''}]

function renderSpecsEditor() {
  var html = '';
  specRows.forEach(function(r, i){
    html += '<div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">';
    html += '<input value="'+esc(r.key)+'" onchange="specRows['+i+'].key=this.value" placeholder="参数名" style="flex:1;padding:6px 10px;font-size:13px">';
    html += '<input value="'+esc(r.value)+'" onchange="specRows['+i+'].value=this.value" placeholder="参数值" style="flex:2;padding:6px 10px;font-size:13px">';
    html += '<span onclick="specRows.splice('+i+',1);renderSpecsEditor()" style="cursor:pointer;color:#f66;font-size:16px">×</span>';
    html += '</div>';
  });
  document.getElementById('specsEditor').innerHTML = html;
}

function addSpecRow(key, value) {
  specRows.push({key: key||'', value: value||''});
  renderSpecsEditor();
}

function setSpecs(specsObj) {
  specRows = [];
  if (specsObj) {
    Object.keys(specsObj).forEach(function(k){
      specRows.push({key: k, value: specsObj[k]});
    });
  }
  renderSpecsEditor();
}

function getSpecs() {
  var obj = {};
  specRows.forEach(function(r){
    if (r.key.trim()) obj[r.key.trim()] = r.value;
  });
  return obj;
}

function autoUpdateSpecs() {
  var cat = document.getElementById('fCat').value;
  var subCat = document.getElementById('fSubCat').value;
  var pType = document.getElementById('fType').value;
  // 自动设置/更新对应规格
  var specs = getSpecs();
  if (pType) specs['产品类型'] = pType;
  setSpecs(specs);
}

function refreshAll() {
  loadAll();
  loadAudit();
}

loadAll();
loadAudit();
