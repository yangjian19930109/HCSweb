<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}} - 华创生电机</title>
    <link rel="stylesheet" href="fonts/fonts.css?v={{BUILD_TIME}}">
    <!-- #include css:common,nav,sidebar,footer,product-detail -->
</head>
<body>
    <!-- #include nav.html -->
    <!-- #include sidebar.html -->

    <div class="product-detail">
        <div class="container">
            <a href="products.html#tab-motor" class="back-link">← 返回产品中心</a>
            <div class="product-hero">
                <div class="product-gallery">
                    <div class="main-img-wrapper">
                        <img id="mainImg" src="{{PRODUCT_MAIN_IMG}}" alt="{{PRODUCT_TITLE}}" class="product-main-img">
                        <button class="img-nav-btn img-prev">&#10094;</button>
                        <button class="img-nav-btn img-next">&#10095;</button>
                    </div>
                    <div class="thumbnails">
                        {{PRODUCT_THUMBNAILS}}
                    </div>
                </div>
                <div class="product-info">
                    <span class="product-tag">{{PRODUCT_TAG}}</span>
                    <h1>{{PRODUCT_TITLE}}</h1>
                    <div class="product-model">型号：{{PRODUCT_MODEL}}</div>
                    <p class="product-desc">{{PRODUCT_DESC}}</p>
                    <div class="product-specs">
                        <h3>规格参数</h3>
                        {{PRODUCT_SPECS}}
                    </div>
                </div>
            </div>
            <div class="product-chart">
                <h2>商品详情</h2>
                {{PRODUCT_CHART_IMAGES}}
                <div class="chart-note">以上曲线图及外形尺寸仅供参考，具体参数以实物为准。</div>
            </div>
        </div>
    </div>

    <!-- #include footer.html -->

    <!-- #include js:common,nav-search,sidebar,product-detail -->
</body>
</html>
