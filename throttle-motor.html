<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节气门马达 - 华创生电机</title>
<style>

        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Share Tech Mono", "Orbitron", "Microsoft YaHei", monospace;
            line-height: 1.6;
            color: #e0e0e0;
            background: #050810;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 顶部导航 */
        .header {
            background: rgba(5, 8, 20, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 245, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.1), 0 2px 10px rgba(0,0,0,0.5);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .header .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
            position: relative;
            height: 80px;
        }

        .logo {
            position: absolute;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #00f5ff;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.8), 0 0 20px rgba(0, 245, 255, 0.4);
            font-family: "Orbitron", monospace;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 32px;
        }

        .nav {
            display: flex;
            gap: 0;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            font-family: "Share Tech Mono", monospace;
            transition: all 0.3s;
            padding: 0 25px;
            height: 80px;
            line-height: 80px;
            display: block;
            border-bottom: 3px solid transparent;
            font-size: 16px;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #00f5ff;
            border-bottom-color: #ff2d78;
            text-shadow: 0 0 8px rgba(0, 245, 255, 0.8);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            right: 20px;
        }

        /* Banner 轮播区域 */
        .banner {
            margin-top: 80px;
            position: relative;
            overflow: hidden;
            display: flex;
            height: 600px;
        }

        /* 左侧深色区域 */
        .banner-left {
            flex: 1;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 50%, #0f2944 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 右侧黄色区域 */
        .banner-right {
            width: 45%;
            background: linear-gradient(135deg, #d4a84b 0%, #c49a3d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .banner-slider {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        .banner-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner-slide.active {
            opacity: 1;
        }

        .banner-slide-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            /* 布加迪跑车全屏背景图 */
            background: url('images/banner-bg.jpg') center / cover no-repeat;
        }

        /* 左侧深色背景 - 半透明深蓝遮罩，右边缘渐变过渡 */
        .banner-dark-bg {
            flex: 1;
            background: linear-gradient(to right, rgba(10, 22, 40, 0.75) 0%, rgba(10, 22, 40, 0.55) 70%, rgba(10, 22, 40, 0.10) 100%);
            position: relative;
        }

        .banner-dark-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 100, 200, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.08) 0%, transparent 40%);
        }

        /* 右侧黄色背景 - 半透明金色遮罩，左边缘渐变过渡 */
        .banner-gold-bg {
            width: 45%;
            background: linear-gradient(to right, rgba(212, 168, 75, 0.30) 0%, rgba(212, 168, 75, 0.60) 40%, rgba(212, 168, 75, 0.75) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* 六边形蜂巢网格 - Banner右侧 (7个正六边形：中心1+周围6) */
        /* 六边形蜂巢 - 7个flat-top环绕排列 (黄金比例放大版×1.25) */
        /* ============================================================
           flat-top 六边形蜂巢 - 金色边框 + 均匀缝隙 v3
           几何: W=183, H=158 (flat-top, clip-path六角形)
           
           蜂巢标准排列(严丝合缝gap=0时):
             上/下邻: dy = H = 158
             斜邻:    dx = W*3/4 = 137.25, dy = H/2 = 79
           
           目标: 所有相邻边之间缝隙 = 8px均匀
           边框: ::before inset:-4px 金色渐变(双边框共8px=缝隙宽)
           
           有gap时的位移增量:
             垂直: delta_y = H + gap = 166
             斜向: delta_x = W*3/4 + gap*cos30° = 137.25 + 6.93 = 144.18 ≈ 144
                    delta_y = H/2   + gap*sin30° = 79 + 4 = 83
           
           中心#1位置: 容器中心偏移到六边形中心
           容器: 470x490
           ============================================================ */
        .banner-product-grid {
            width: 470px;
            height: 490px;
            position: relative;
            margin: 0 auto;
        }

        .banner-product-item {
            width: 183px;
            height: 158px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            position: absolute;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* 金色边框: 伪元素撑大4px后裁剪叠加 */
        .banner-product-item::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(135deg, #d4a84b, #f5d78e, #d4a84b);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            z-index: 1;
        }

        .banner-product-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 0;
        }

        .banner-product-item:hover {
            transform: translate(var(--tx), var(--ty)) scale(1.15) !important;
            z-index: 50 !important;
            filter: brightness(1.1);
        }

        /* 放大1.15倍完全覆盖8px缝隙，并超出边框 */

        .banner-product-item:hover::before {
            background: linear-gradient(135deg, #00a8cc, #005d73, #00a8cc) !important;
        }

        /*
         * flat-top 蜂巢 - 8px均匀缝隙
         * 中心六边形左上角 = (143.5, 166)
         * #2上: y -= 166
         * #3右上: x += 144, y -= 83
         * #4右下: x += 144, y += 83
         * #5下: y += 166
         * #6左下: x -= 144, y += 83
         * #7左上: x -= 144, y -= 83
         */
        /* #1 中心  */ .banner-product-item:nth-child(1) { --tx: 143.5px; --ty: 166px; transform: translate(143.5px, 166px); z-index: 7; }
        /* #2 上    */ .banner-product-item:nth-child(2) { --tx: 143.5px; --ty:   0px; transform: translate(143.5px,   0px); z-index: 6; }
        /* #3 右上  */ .banner-product-item:nth-child(3) { --tx: 287.5px; --ty:  83px; transform: translate(287.5px,  83px); z-index: 6; }
        /* #4 右下  */ .banner-product-item:nth-child(4) { --tx: 287.5px; --ty: 249px; transform: translate(287.5px, 249px); z-index: 6; }
        /* #5 下    */ .banner-product-item:nth-child(5) { --tx: 143.5px; --ty: 332px; transform: translate(143.5px, 332px); z-index: 6; }
        /* #6 左下  */ .banner-product-item:nth-child(6) { --tx:  -0.5px; --ty: 249px; transform: translate( -0.5px, 249px); z-index: 6; }
        /* #7 左上  */ .banner-product-item:nth-child(7) { --tx:  -0.5px; --ty:  83px; transform: translate( -0.5px,  83px); z-index: 6; }

        /* 电机背景图形 */
        .banner-motor-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        /* 齿轮图形 */
        .motor-gear {
            position: absolute;
            border: 3px solid rgba(0, 168, 255, 0.15);
            border-radius: 50%;
        }

        .motor-gear::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(0, 168, 255, 0.1);
            border-radius: 50%;
        }

        .gear-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            animation: rotate 30s linear infinite;
        }

        .gear-1::before {
            width: 300px;
            height: 300px;
        }

        .gear-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            left: -50px;
            animation: rotate 25s linear infinite reverse;
        }

        .gear-2::before {
            width: 220px;
            height: 220px;
        }

        .gear-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            right: 15%;
            animation: rotate 20s linear infinite;
        }

        .gear-3::before {
            width: 140px;
            height: 140px;
        }

        /* 电机线圈 */
        .motor-coil {
            position: absolute;
            width: 350px;
            height: 350px;
            top: 50%;
            left: 60%;
            transform: translate(-50%, -50%);
            border: 4px solid rgba(0, 168, 255, 0.1);
            border-radius: 50%;
        }

        .motor-coil::before,
        .motor-coil::after {
            content: '';
            position: absolute;
            border: 3px solid rgba(0, 168, 255, 0.08);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .motor-coil::before {
            width: 280px;
            height: 280px;
        }

        .motor-coil::after {
            width: 210px;
            height: 210px;
            border: 2px solid rgba(0, 168, 255, 0.06);
        }

        /* 电路线条 */
        .circuit-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .circuit-lines span {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(0, 168, 255, 0.1), transparent);
            height: 1px;
        }

        .circuit-lines span:nth-child(1) {
            width: 300px;
            top: 20%;
            left: 10%;
            transform: rotate(-15deg);
        }

        .circuit-lines span:nth-child(2) {
            width: 250px;
            top: 40%;
            right: 20%;
            transform: rotate(10deg);
        }

        .circuit-lines span:nth-child(3) {
            width: 200px;
            bottom: 30%;
            left: 20%;
            transform: rotate(5deg);
        }

        .circuit-lines span:nth-child(4) {
            width: 280px;
            bottom: 20%;
            right: 15%;
            transform: rotate(-8deg);
        }

        /* 转子 */
        .motor-rotor {
            position: absolute;
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(0, 200, 255, 0.12);
            border-radius: 50%;
            animation: pulse-rotate 8s ease-in-out infinite;
        }

        .motor-rotor::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* 定子 */
        .motor-stator {
            position: absolute;
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(0, 168, 255, 0.08);
            border-radius: 50%;
            animation: rotate 40s linear infinite reverse;
        }

        /* 磁场线 */
        .magnetic-field span {
            position: absolute;
            border: 1px solid rgba(0, 200, 255, 0.1);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .magnetic-field span:nth-child(1) {
            width: 500px;
            height: 500px;
        }

        .magnetic-field span:nth-child(2) {
            width: 600px;
            height: 600px;
        }

        .magnetic-field span:nth-child(3) {
            width: 700px;
            height: 700px;
        }

        /* 脉冲效果 */
        .motor-pulse {
            position: absolute;
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(0, 168, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        /* 能量波 */
        .energy-waves span {
            position: absolute;
            border: 2px solid rgba(0, 200, 255, 0.1);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: wave 4s ease-out infinite;
        }

        .energy-waves span:nth-child(1) { animation-delay: 0s; }
        .energy-waves span:nth-child(2) { animation-delay: 1s; }
        .energy-waves span:nth-child(3) { animation-delay: 2s; }
        .energy-waves span:nth-child(4) { animation-delay: 3s; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-rotate {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            50% { transform: translate(-50%, -50%) rotate(180deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; }
        }

        @keyframes wave {
            0% { width: 100px; height: 100px; opacity: 0; }
            100% { width: 500px; height: 500px; opacity: 0; }
        }

        .banner-content {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            text-align: left;
            color: #fff;
            max-width: 500px;
        }

        .banner-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .banner-subtitle {
            font-size: 18px;
            font-weight: 400;
            color: #f5a623;
            margin-bottom: 25px;
        }

        .banner-btn {
            display: inline-block;
            background: #f5a623;
            color: #fff;
            padding: 12px 30px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            border: 2px solid #f5a623;
        }

        .banner-btn:hover {
            background: transparent;
            color: #f5a623;
        }

        /* 轮播控制 */
        .banner-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .banner-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .banner-dot.active {
            background: #fff;
            transform: scale(1.2);
        }

        .banner-arrows {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 10;
        }

        .banner-arrow {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
            color: #fff;
            font-size: 20px;
        }

        .banner-arrow:hover {
            background: rgba(255,255,255,0.4);
            border-color: #fff;
        }

        /* 统计区域 */
        .stats-section {
            background: #005d73;
            padding: 60px 0;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            text-align: center;
        }

        .stat-item {
            padding: 20px;
        }

        .stat-number {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 16px;
            opacity: 0.9;
        }

        /* 通用区域标题 */
        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 36px;
            color: #005d73;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .section-subtitle {
            font-size: 16px;
            color: #666;
        }

        /* 关于我们 */
        .about-section {
            padding: 80px 0;
            background: #f8f9fa;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-text h3 {
            font-size: 28px;
            color: #005d73;
            margin-bottom: 20px;
        }

        .about-text p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .about-image {
            position: relative;
        }

        /* 产品区域 - 六边形蜂巢布局 */
        .products-section {
            padding: 60px 0 80px;
            background: #f5f5f5;
            text-align: center;
        }

        .products-section .section-title {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .products-section .section-subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 50px;
        }

        /* 六边形网格 */
        .hex-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px 30px;
        }

        .hex {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hex-inner {
            width: 160px;
            height: 184px;
            position: relative;
        }

        /* 六边形使用 clip-path 创建 */
        .hex-content {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: #005d73;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            overflow: hidden;
        }

        .hex:hover .hex-content {
            background: #007a8a;
            transform: scale(1.05);
        }

        .hex-content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hex-label {
            margin-top: 15px;
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        /* 响应式六边形 */
        @media (max-width: 768px) {
            .hex-inner {
                width: 120px;
                height: 138px;
            }
            
            .hex-grid {
                gap: 15px 20px;
            }
            
            .hex-label {
                font-size: 12px;
                margin-top: 10px;
            }
        }

        @media (max-width: 480px) {
            .hex-inner {
                width: 100px;
                height: 115px;
            }
        }

        .clear {
            clear: both;
        }
        }

        /* 新闻资讯 */
        .news-section {
            padding: 80px 0;
            background: #f8f9fa;
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .news-featured {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .news-featured-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff;
        }

        .news-featured-content h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .news-featured-content .date {
            font-size: 14px;
            opacity: 0.8;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
